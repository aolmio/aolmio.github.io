<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aolmio | Portfolio</title>
    <!-- 1. Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 2. Lucide Icons (Modern alternative to FontAwesome) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- 3. Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script>
        // Tailwind Configuration for Dark Mode & Custom Colors
        tailwind.config = {
            darkMode: 'media',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>
        /* Modern Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5da; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #30363d; }
        
        /* Smooth state transitions */
        .repo-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#0d1117] text-slate-900 dark:text-slate-200 min-h-screen selection:bg-blue-100 dark:selection:bg-blue-900">

    <!-- Header Section -->
    <header class="max-w-6xl mx-auto px-6 pt-20 pb-16 text-center">
        <h1 class="text-5xl font-bold tracking-tight mb-4 bg-gradient-to-r from-blue-600 to-indigo-500 bg-clip-text text-transparent">
            aolmio
        </h1>
        <p class="text-lg text-slate-600 dark:text-slate-400 max-w-2xl mx-auto">
my Vibes        </p>
    </header>

    <!-- Main Repository Grid -->
    <main class="max-w-6xl mx-auto px-6 pb-24">
        <div id="repo-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Skeleton Loaders (Shown while fetching) -->
            <template id="skeleton-template">
                <div class="animate-pulse bg-white dark:bg-[#161b22] border border-slate-200 dark:border-slate-800 rounded-xl p-6 h-48">
                    <div class="h-4 w-20 bg-slate-200 dark:bg-slate-700 rounded mb-4"></div>
                    <div class="h-6 w-3/4 bg-slate-200 dark:bg-slate-700 rounded mb-3"></div>
                    <div class="h-4 w-full bg-slate-200 dark:bg-slate-700 rounded mb-2"></div>
                    <div class="h-4 w-2/3 bg-slate-200 dark:bg-slate-700 rounded mt-auto"></div>
                </div>
            </template>
        </div>
    </main>

    <!-- Project Card Template -->
    <template id="card-template">
        <article class="repo-card group bg-white dark:bg-[#161b22] border border-slate-200 dark:border-slate-800 rounded-xl p-6 flex flex-direction: column shadow-sm hover:shadow-xl hover:border-blue-500/50 dark:hover:border-blue-400/50 hover:-translate-y-1">
            <div class="flex-grow">
                <div class="flex justify-between items-start mb-3">
                    <span class="language-tag text-[10px] uppercase tracking-widest font-bold px-2 py-1 rounded-md bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400"></span>
                    <i data-lucide="github" class="w-4 h-4 text-slate-400"></i>
                </div>
                <h2 class="repo-name text-xl font-semibold text-slate-900 dark:text-white mb-2 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors"></h2>
                <p class="repo-desc text-sm text-slate-500 dark:text-slate-400 leading-relaxed line-clamp-3 mb-6"></p>
            </div>
            
            <div class="flex gap-3 mt-auto">
                <a href="#" class="repo-code-link flex items-center justify-center gap-2 flex-1 text-xs font-semibold py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-[#161b22] hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">
                    <i data-lucide="code-2" class="w-3.5 h-3.5"></i> Source
                </a>
                <a href="#" class="repo-live-link flex items-center justify-center gap-2 flex-1 text-xs font-semibold py-2.5 rounded-lg bg-blue-600 text-white hover:bg-blue-700 shadow-md shadow-blue-500/20 transition-all">
                    <i data-lucide="external-link" class="w-3.5 h-3.5"></i> Live Demo
                </a>
            </div>
        </article>
    </template>

    <script>
        const username = 'aolmio';
        const container = document.getElementById('repo-container');
        const cardTemplate = document.getElementById('card-template');
        const skeletonTemplate = document.getElementById('skeleton-template');

        // Show 6 skeletons while loading
        const showSkeletons = () => {
            for (let i = 0; i < 6; i++) {
                container.appendChild(skeletonTemplate.content.cloneNode(true));
            }
        };

        async function fetchRepos() {
            showSkeletons();
            try {
                const response = await fetch(`https://api.github.com/users/${username}/repos?sort=updated&per_page=100`);
                if (!response.ok) throw new Error('API Error');
                const repos = await response.json();
                
                container.innerHTML = '';
                const fragment = document.createDocumentFragment();

                repos.forEach(repo => {
                    if (repo.name.toLowerCase() === `${username}.github.io`.toLowerCase()) return;

                    const clone = cardTemplate.content.cloneNode(true);
                    
                    // Fill Data
                    clone.querySelector('.language-tag').textContent = repo.language || 'Project';
                    clone.querySelector('.repo-name').textContent = repo.name.replaceAll('-', ' ').replaceAll('_', ' ');
                    clone.querySelector('.repo-desc').textContent = repo.description || 'A unique project exploring the boundaries of code and creativity.';
                    
                    // Links
                    clone.querySelector('.repo-code-link').href = repo.html_url;
                    clone.querySelector('.repo-live-link').href = repo.homepage || `https://${username}.github.io/${repo.name}/`;

                    fragment.appendChild(clone);
                });

                container.appendChild(fragment);
                // Initialize Lucide icons after adding to DOM
                lucide.createIcons();

            } catch (error) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-20">
                        <i data-lucide="alert-circle" class="w-12 h-12 text-red-500 mx-auto mb-4"></i>
                        <p class="text-slate-500">Failed to load repositories. Please try again later.</p>
                    </div>
                `;
                lucide.createIcons();
            }
        }

        fetchRepos();
    </script>
</body>
</html>
