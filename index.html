<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="my vibes">
    <title>aolmio | Project Portfolio</title>
    <style>
        /* 1. CSS Variables & Modern Theming including Dark Mode */
        :root {
            --primary: #0366d6;
            --success: #2ea44f;
            --bg: #f6f8fa;
            --surface: #ffffff;
            --text-main: #24292e;
            --text-muted: #586069;
            --border: #d1d5da;
            --radius: 8px;
            /* Modern system font stack */
            --font-sans: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --primary: #58a6ff;
                --success: #3fb950;
                --bg: #0d1117;
                --surface: #161b22;
                --text-main: #c9d1d9;
                --text-muted: #8b949e;
                --border: #30363d;
            }
        }

        /* 2. Modern Reset & Logical Properties */
        *, *::before, *::after { box-sizing: border-box; }

        body { 
            font-family: var(--font-sans); 
            line-height: 1.6; 
            max-width: 1000px; 
            margin: 0 auto; 
            /* clamp() for fluid responsive padding */
            padding: clamp(1rem, 5vw, 2.5rem); 
            background: var(--bg); 
            color: var(--text-main); 
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        header { 
            text-align: center; 
            margin-block-end: 3rem; /* Logical property replacing margin-bottom */
        }
        
        header h1 {
            margin: 0;
            font-size: clamp(2rem, 5vw, 2.5rem);
        }

        .repo-grid { 
            display: grid; 
            /* min() prevents overflow on tiny screens */
            grid-template-columns: repeat(auto-fill, minmax(min(100%, 280px), 1fr)); 
            gap: 1.5rem; 
        }

        .repo-card { 
            background: var(--surface); 
            padding: 1.25rem; 
            border: 1px solid var(--border); 
            border-radius: var(--radius); 
            display: flex; 
            flex-direction: column; 
            /* Smoother modern easing */
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s ease; 
        }

        /* :focus-within ensures keyboard navigators see the hover state */
        .repo-card:hover, .repo-card:focus-within { 
            transform: translateY(-4px); 
            box-shadow: 0 12px 24px rgba(0,0,0,0.1); 
            border-color: var(--primary); 
        }

        .repo-card h2 { 
            margin: 0 0 0.5rem 0; 
            font-size: 1.25rem; 
            color: var(--primary); 
            text-transform: lowercase; 
        }

        .repo-card p { 
            font-size: 0.95rem; 
            color: var(--text-muted); 
            flex-grow: 1; 
            margin-block-end: 1.25rem; 
        }

        .tag { 
            display: inline-block;
            font-size: 0.75rem; 
            background: var(--border);
            color: var(--text-main); 
            padding: 0.15rem 0.6rem; 
            border-radius: 9999px; /* Pill shape */
            margin-block-end: 0.5rem; 
            font-weight: 500; 
        }

        .button-group { display: flex; gap: 0.5rem; }

        .btn { 
            flex: 1; 
            text-align: center; 
            text-decoration: none; 
            font-size: 0.875rem; 
            font-weight: 600; 
            padding: 0.5rem; 
            border-radius: 6px;
            transition: background-color 0.2s, opacity 0.2s;
        }

        .btn-code { background: var(--bg); color: var(--text-main); border: 1px solid var(--border); }
        .btn-code:hover { background: var(--border); }
        .btn-live { background: var(--success); color: #ffffff; border: 1px solid transparent; }
        .btn-live:hover { opacity: 0.9; }

        .status-msg { text-align: center; color: var(--text-muted); grid-column: 1 / -1; padding: 2rem; }
    </style>
</head>
<body>

    <header>
        <h1>aolmio</h1>
        <p>Software developer & creator. Exploring new ideas through code.</p>
    </header>

    <!-- Semantic main tag with aria-live for screen readers -->
    <main id="repo-container" class="repo-grid" aria-live="polite">
        <div class="status-msg">Fetching projects...</div>
    </main>

    <!-- HTML5 Template for better performance and security -->
    <template id="repo-card-template">
        <article class="repo-card">
            <div>
                <span class="tag"></span>
                <h2></h2>
                <p></p>
            </div>
            <div class="button-group">
                <!-- rel="noopener noreferrer" added for security on external links -->
                <a href="#" class="btn btn-code" target="_blank" rel="noopener noreferrer">View Source</a>
                <a href="#" class="btn btn-live" target="_blank" rel="noopener noreferrer">Live Demo</a>
            </div>
        </article>
    </template>

    <script>
        const username = 'aolmio';
        const container = document.getElementById('repo-container');
        const template = document.getElementById('repo-card-template');

        async function fetchRepos() {
            try {
                const response = await fetch(`https://api.github.com/users/${username}/repos?sort=updated&per_page=100`);
                
                // Better error handling for API limits/failures
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const repos = await response.json();
                container.innerHTML = ''; 

                // Use DocumentFragment for batched DOM updates (massive performance boost)
                const fragment = document.createDocumentFragment();

                // Object destructuring for cleaner variables
                repos.forEach(({ name, homepage, language, description, html_url }) => {
                    if (name.toLowerCase() === `${username}.github.io`.toLowerCase()) return;

                    const liveLink = homepage || `https://${username}.github.io/${name}/`;
                    
                    // Clone the template
                    const clone = template.content.cloneNode(true);
                    
                    // Inject data using textContent to prevent XSS attacks
                    clone.querySelector('.tag').textContent = language || 'Code';
                    clone.querySelector('h2').textContent = name;
                    clone.querySelector('p').textContent = description || 'No description provided yet.';
                    
                    const links = clone.querySelectorAll('a');
                    links[0].href = html_url;
                    links[1].href = liveLink;

                    fragment.appendChild(clone);
                });

                // Append everything to the DOM at once
                container.appendChild(fragment);

            } catch (error) {
                console.error('Failed to fetch repositories:', error);
                container.innerHTML = '<div class="status-msg">Unable to load projects at this time. Please refresh to try again.</div>';
            }
        }

        fetchRepos();
    </script>
</body>
</html>
