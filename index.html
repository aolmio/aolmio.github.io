<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="aolmio portfolio — responsive GitHub-powered project showcase" />
  <meta name="theme-color" content="#0d1117" />
  <title>aolmio | Portfolio</title>

  <!-- Performance -->
  <link rel="preconnect" href="https://api.github.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          animation: { fade: 'fade .35s ease-out' },
          keyframes: {
            fade: {
              from: { opacity: 0, transform: 'translateY(12px)' },
              to: { opacity: 1, transform: 'translateY(0)' }
            }
          }
        }
      }
    }
  </script>

  <script defer src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root { color-scheme: light dark; }
    body { font-family: Inter, sans-serif; -webkit-font-smoothing: antialiased; }
    
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { 
      background: #475569; 
      border-radius: 10px; 
      border: 3px solid transparent; 
      background-clip: content-box;
    }

    .glass-nav {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .dark .glass-nav {
      background: rgba(13, 17, 23, 0.7);
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>

<body class="bg-slate-50 text-slate-900 dark:bg-[#0d1117] dark:text-slate-200 min-h-screen selection:bg-blue-500/30">

  <!-- Header & Search -->
  <nav class="sticky top-0 z-40 glass-nav border-b border-slate-200 dark:border-slate-800 transition-colors">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
      <span class="font-bold text-xl tracking-tight bg-gradient-to-r from-blue-600 to-indigo-500 bg-clip-text text-transparent">aolmio</span>
      
      <div class="flex items-center gap-4">
        <div class="relative hidden sm:block">
          <input id="searchInput" type="search" placeholder="Search projects..." 
            class="w-64 px-4 py-1.5 text-sm rounded-full border border-slate-300 dark:border-slate-700 bg-white/50 dark:bg-slate-900/50 outline-none focus:ring-2 focus:ring-blue-500 transition-all" />
        </div>
        <button id="themeToggle" aria-label="Toggle theme" class="p-2 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
          <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
          <i data-lucide="moon" class="w-5 h-5 block dark:hidden"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <header class="max-w-4xl mx-auto px-6 py-16 text-center animate-fade">
    <h1 class="text-5xl md:text-7xl font-black mb-6 tracking-tighter">Building things for the <span class="text-blue-600">web.</span></h1>
    <p class="text-lg text-slate-600 dark:text-slate-400">Software developer exploring the intersection of design and performance.</p>
    
    <!-- Mobile Search -->
    <div class="mt-8 sm:hidden">
      <input id="searchInputMobile" type="search" placeholder="Search projects..." 
        class="w-full px-4 py-3 rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 outline-none focus:ring-2 focus:ring-blue-500" />
    </div>
  </header>

  <!-- Main Grid -->
  <main class="max-w-7xl mx-auto px-6 pb-24">
    <div id="repo-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" aria-live="polite">
      <!-- Content injected by JS -->
    </div>
  </main>

  <!-- Templates -->
  <template id="skeleton-template">
    <div class="animate-pulse bg-white dark:bg-[#161b22] border border-slate-200 dark:border-slate-800 rounded-2xl p-6 h-56">
      <div class="flex justify-between mb-4">
        <div class="h-4 w-16 bg-slate-200 dark:bg-slate-700 rounded"></div>
        <div class="h-4 w-4 bg-slate-200 dark:bg-slate-700 rounded-full"></div>
      </div>
      <div class="h-6 w-3/4 bg-slate-200 dark:bg-slate-700 rounded mb-4"></div>
      <div class="space-y-2">
        <div class="h-3 w-full bg-slate-200 dark:bg-slate-700 rounded"></div>
        <div class="h-3 w-5/6 bg-slate-200 dark:bg-slate-700 rounded"></div>
      </div>
    </div>
  </template>

  <template id="card-template">
    <article class="group flex flex-col bg-white dark:bg-[#161b22] border border-slate-200 dark:border-slate-800 rounded-2xl p-6 hover:shadow-xl hover:border-blue-500/50 transition-all duration-300 animate-fade">
      <div class="flex justify-between items-start mb-4">
        <span class="language-tag text-[10px] uppercase font-bold tracking-widest px-2 py-1 rounded bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400"></span>
        <i data-lucide="github" class="w-5 h-5 text-slate-400"></i>
      </div>
      
      <h2 class="repo-name text-xl font-bold mb-2 group-hover:text-blue-500 transition-colors"></h2>
      <p class="repo-desc text-sm text-slate-500 dark:text-slate-400 line-clamp-3 flex-grow mb-6"></p>

      <div class="grid grid-cols-2 gap-3 mt-auto">
        <a class="repo-code-link flex items-center justify-center gap-2 text-xs font-bold py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
          Source
        </a>
        <a class="repo-live-link flex items-center justify-center gap-2 text-xs font-bold py-2.5 rounded-lg bg-slate-900 dark:bg-white text-white dark:text-slate-900 hover:opacity-90 transition-opacity">
          View Demo
        </a>
      </div>
    </article>
  </template>

  <script>
    const CONFIG = {
      username: 'aolmio',
      cacheKey: 'repos_aolmio_v4',
      ttl: 1000 * 60 * 15 // 15 mins
    };

    let allRepos = [];
    const container = document.getElementById('repo-container');
    const searchInputs = [document.getElementById('searchInput'), document.getElementById('searchInputMobile')];

    // Initialize Theme
    function initTheme() {
      const isDark = localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.classList.toggle('dark', isDark);
    }

    document.getElementById('themeToggle').onclick = () => {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.theme = isDark ? 'dark' : 'light';
    };

    function showSkeletons() {
      container.innerHTML = Array(6).fill('').map(() => document.getElementById('skeleton-template').innerHTML).join('');
    }

    function render(repos) {
      container.innerHTML = '';
      if (!repos.length) {
        container.innerHTML = `<div class="col-span-full py-20 text-center text-slate-500">No projects found matching that criteria.</div>`;
        return;
      }

      const fragment = document.createDocumentFragment();
      const template = document.getElementById('card-template');

      repos.forEach(repo => {
        if (repo.name.toLowerCase() === `${CONFIG.username}.github.io`) return;

        const clone = template.content.cloneNode(true);
        clone.querySelector('.language-tag').textContent = repo.language || 'Project';
        clone.querySelector('.repo-name').textContent = repo.name.replace(/[-_]/g, ' ');
        clone.querySelector('.repo-desc').textContent = repo.description || 'Exploring development through creative problem solving.';
        
        const codeLink = clone.querySelector('.repo-code-link');
        codeLink.href = repo.html_url;
        codeLink.target = '_blank';

        const liveLink = clone.querySelector('.repo-live-link');
        liveLink.href = repo.homepage || `https://${CONFIG.username}.github.io/${repo.name}/`;
        liveLink.target = '_blank';

        fragment.appendChild(clone);
      });

      container.appendChild(fragment);
      if (window.lucide) lucide.createIcons();
    }

    async function fetchData() {
      showSkeletons();
      
      const cached = localStorage.getItem(CONFIG.cacheKey);
      if (cached) {
        const { data, time } = JSON.parse(cached);
        if (Date.now() - time < CONFIG.ttl) {
          allRepos = data;
          render(allRepos);
          // Return early but still fetch in background to refresh cache (SWR pattern)
        }
      }

      try {
        const res = await fetch(`https://api.github.com/users/${CONFIG.username}/repos?sort=updated&per_page=100`);
        if (!res.ok) throw new Error('API Error');
        allRepos = await res.json();
        localStorage.setItem(CONFIG.cacheKey, JSON.stringify({ data: allRepos, time: Date.now() }));
        render(allRepos);
      } catch (err) {
        if (!allRepos.length) {
          container.innerHTML = `<p class="col-span-full text-center text-red-500 py-12">Failed to sync with GitHub. Please try again later.</p>`;
        }
      }
    }

    // Simple Debounce
    let debounceTimer;
    const handleSearch = (e) => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        const q = e.target.value.toLowerCase();
        const filtered = allRepos.filter(r => 
          r.name.toLowerCase().includes(q) || 
          (r.description || '').toLowerCase().includes(q) ||
          (r.language || '').toLowerCase().includes(q)
        );
        render(filtered);
      }, 200);
    };

    searchInputs.forEach(input => input.addEventListener('input', handleSearch));

    initTheme();
    fetchData();
  </script>
</body>
</html>
